<div class="glyph-search">
    <form>
        <input type="text" placeholder="字" required size="1" maxlength="2" disabled>
        <button type="submit" disabled>Go</button>
    </form>
</div>

<script>
    const blocks = [
        [0x3400, 0x4DBF],   // CJK Unified Ideographs Extension A
        [0x4E00, 0x9FFF],   // CJK Unified Ideographs
        [0xF900, 0xFAD9],   // CJK Compatibility Ideographs
        [0x20000, 0x2A6DF], // CJK Unified Ideographs Extension B
        [0x2A700, 0x2B73F], // CJK Unified Ideographs Extension C
        [0x2B740, 0x2B81F], // CJK Unified Ideographs Extension D
        [0x2B820, 0x2CEAF], // CJK Unified Ideographs Extension E
        [0x2CEB0, 0x2EBEF], // CJK Unified Ideographs Extension F
        [0x2EBF0, 0x2EE5F], // CJK Unified Ideographs Extension I
        [0x2F800, 0x2FA1D], // CJK Compatibility Ideographs Supplement
        [0x30000, 0x3134A], // CJK Unified Ideographs Extension G
        [0x31350, 0x323AF], // CJK Unified Ideographs Extension H
        [0x323B0, 0x33479], // CJK Unified Ideographs Extension J
    ];

    // Use binary search to check if a code point is in CJK ideograph blocks
    function isCjkIdeograph(codePoint) {
        let low = 0;
        let high = blocks.length - 1;
        while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            const [start, end] = blocks[mid];
            if (codePoint >= start && codePoint <= end) {
                return true;
            } else if (codePoint < start) {
                high = mid - 1;
            } else {
                low = mid + 1;
            }
        }
        return false;
    }

    document.addEventListener("DOMContentLoaded", function () {
        const forms = document.querySelectorAll(".glyph-search");
        let glyphData = null;
        fetch('{{ .Site.BaseURL }}index.json')
            .then(response => response.json())
            .then(data => {
                glyphData = data;
                forms.forEach(form => {
                    const input = form.querySelector("input");
                    const button = form.querySelector("button");
                    input.disabled = false;
                    button.disabled = false;
                    input.addEventListener("input", (e) => { input.setCustomValidity(""); });
                });
            })
            .catch(err => console.error("Failed to load glyph data", err));

        forms.forEach(form => {
            const input = form.querySelector("input");
            form.addEventListener("submit", function (e) {
                e.preventDefault();
                const char = input.value.trim();
                if (!char) return;

                const targetCodePoint = char.codePointAt(0);
                const targetChar = String.fromCodePoint(targetCodePoint);

                if (!isCjkIdeograph(targetCodePoint)) {
                    input.setCustomValidity(`'${char}' is not a valid glyph.`);
                    input.reportValidity();
                    return;
                }

                const { base, radical } = glyphData[targetChar] || {};

                if (base) {
                    window.location.href = `{{ .Site.BaseURL }}radicals/${radical}/#${base}`;
                } else {
                    input.setCustomValidity(`Glyph '${targetChar}' has not yet been described.`);
                    input.reportValidity();
                }
            });
        });
    });
</script>
